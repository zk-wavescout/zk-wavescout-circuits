name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          nargo --version

      - name: Pin Nargo version
        run: noirup --version 0.30.0

      - name: Compile circuit
        run: nargo compile

      - name: Run tests
        run: nargo test

      - name: Generate proof (smoke test)
        run: nargo prove || echo "Skipped — Prover.toml uses placeholder values"
